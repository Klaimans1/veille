<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>IHES — Écran de veille</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    background: #000;
    overflow: hidden;
    cursor: none;
    -webkit-user-select: none; user-select: none;
    touch-action: none;
  }
  #stage { position: fixed; inset: 0; }

  #logo {
    position: absolute;
    top: 0; left: 0;
    will-change: transform;
    display: flex; flex-direction: column; align-items: center;
    color: #46c2ff;
  }

  /* Vrai logo : affiché tel quel (jamais bloqué), recoloré par un filtre. */
  #logo img {
    width: 320px; max-width: 38vw; height: auto; display: block;
    transition: filter .25s ease;
  }

  /* Texte de secours, seulement si le fichier logo est absent */
  #logo.no-image img { display: none; }
  #logo .mark, #logo .full { display: none; }
  #logo.no-image .mark {
    display: block;
    font-family: Georgia, "Times New Roman", serif;
    font-weight: 700; font-size: 92px; line-height: 1; letter-spacing: 6px;
    text-align: center;
  }
  #logo.no-image .full {
    display: block; margin-top: 14px;
    font-family: Arial, Helvetica, sans-serif;
    font-size: 18px; letter-spacing: 2px; text-transform: uppercase;
    text-align: center; opacity: 0.92;
  }

  #hint {
    position: fixed; bottom: 18px; left: 50%; transform: translateX(-50%);
    color: #555; font-family: Arial, sans-serif; font-size: 14px;
    transition: opacity .6s; text-align: center;
  }
</style>
</head>
<body>
  <div id="stage">
    <div id="logo">
      <img id="logoImg" src="ihes-logo.png" alt="IHES"
           onerror="document.getElementById('logo').classList.add('no-image')">
      <div class="mark">IHES</div>
      <div class="full">Institut des Hautes<br>Etudes Scientifiques</div>
    </div>
  </div>
  <div id="hint">Touchez l'écran pour passer en plein écran</div>

<script>
(function () {
  const logo = document.getElementById('logo');
  const img  = document.getElementById('logoImg');
  const hint = document.getElementById('hint');

  // Teintes parcourues à chaque rebond (en degrés). Le logo bleu est
  // tourné vers d'autres couleurs. saturate/brightness rendent ça vif.
  const HUES = [0, 45, 90, 135, 180, 225, 270, 315];
  // Couleurs du texte de secours (si pas de logo), pour rester cohérent.
  const textColors = ['#46c2ff','#1ec98b','#e8c81a','#ff7043','#e8491a','#c91e9e','#7a5cff','#1a73e8'];
  let ci = 0;

  let x = 100, y = 80, vx = 4.2, vy = 3.1;
  let w = 0, h = 0, W = 0, H = 0;

  function applyColor() {
    img.style.filter = 'hue-rotate(' + HUES[ci] + 'deg) saturate(1.7) brightness(1.15)';
    logo.style.color = textColors[ci];
  }

  function measure() {
    W = window.innerWidth; H = window.innerHeight;
    w = logo.offsetWidth; h = logo.offsetHeight;
    if (x + w > W) x = W - w;
    if (y + h > H) y = H - h;
  }

  function nextColor() {
    ci = (ci + 1) % HUES.length;
    applyColor();
  }

  function tick() {
    x += vx; y += vy;
    let b = false;
    if (x <= 0)     { x = 0;     vx = Math.abs(vx);  b = true; }
    if (x + w >= W) { x = W - w; vx = -Math.abs(vx); b = true; }
    if (y <= 0)     { y = 0;     vy = Math.abs(vy);  b = true; }
    if (y + h >= H) { y = H - h; vy = -Math.abs(vy); b = true; }
    if (b) nextColor();
    logo.style.transform = 'translate(' + x + 'px,' + y + 'px)';
    requestAnimationFrame(tick);
  }

  function goFullscreen() {
    const el = document.documentElement;
    const req = el.requestFullscreen || el.webkitRequestFullscreen;
    if (req) { try { req.call(el); } catch (e) {} }
  }
  function dismissHint() { hint.style.opacity = '0'; goFullscreen(); }

  if (img.complete && img.naturalWidth === 0) {
    logo.classList.add('no-image');   // image déjà en échec
  }
  img.addEventListener('load', measure);
  window.addEventListener('resize', measure);
  document.addEventListener('click', dismissHint);
  document.addEventListener('touchstart', dismissHint, { passive: true });

  if ('wakeLock' in navigator) {
    const lock = () => { try { navigator.wakeLock.request('screen'); } catch (e) {} };
    lock();
    document.addEventListener('visibilitychange', function () {
      if (document.visibilityState === 'visible') lock();
    });
  }

  applyColor();
  measure();
  requestAnimationFrame(tick);
})();
</script>
</body>
</html>
