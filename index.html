<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>IHES — Écran de veille</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    background: #000;
    overflow: hidden;
    cursor: none;
    -webkit-user-select: none; user-select: none;
    touch-action: none;
  }
  #stage { position: fixed; inset: 0; }

  /* Le logo qui rebondit. currentColor change à chaque rebond et colore
     le logo officiel (via masque) OU le texte de secours. */
  #logo {
    position: absolute;
    top: 0; left: 0;
    will-change: transform;
    display: flex; flex-direction: column; align-items: center;
    padding: 24px 36px;
    color: #ffffff;
  }

  /* --- Logo officiel IHES, recolorable (technique du masque) --- */
  #logoMask { display: none; }
  #logo.use-image #logoMask { display: block; }
  #logoMask {
    -webkit-mask: var(--logo-src) center / contain no-repeat;
            mask: var(--logo-src) center / contain no-repeat;
    background-color: currentColor;
  }

  /* --- Texte de secours (si le logo ne se charge pas) --- */
  #logo.use-image .mark,
  #logo.use-image .full { display: none; }
  #logo .mark {
    font-family: Georgia, "Times New Roman", serif;
    font-weight: 700; font-size: 92px; line-height: 1; letter-spacing: 6px;
  }
  #logo .full {
    margin-top: 14px;
    font-family: Arial, Helvetica, sans-serif;
    font-size: 18px; letter-spacing: 2px; text-transform: uppercase;
    text-align: center; opacity: 0.92;
  }

  #hint {
    position: fixed; bottom: 18px; left: 50%; transform: translateX(-50%);
    color: #555; font-family: Arial, sans-serif; font-size: 14px;
    transition: opacity .6s; text-align: center;
  }
</style>
</head>
<body>
  <div id="stage">
    <div id="logo">
      <div id="logoMask"></div>
      <div class="mark">IHES</div>
      <div class="full">Institut des Hautes<br>Etudes Scientifiques</div>
    </div>
  </div>
  <div id="hint">Touchez l'écran pour passer en plein écran</div>

<script>
(function () {
  const logo = document.getElementById('logo');
  const mask = document.getElementById('logoMask');
  const hint = document.getElementById('hint');

  // Logo officiel IHES (version blanche, fond transparent).
  const LOGO_URL = 'https://www.ihes.fr/wp-content/themes/ihes/assets/img/logo/ihes-logo-footer.png';

  // Palette façon "logo DVD"
  const colors = ['#1a73e8','#e8491a','#1ec98b','#e8c81a','#c91e9e','#ffffff','#46c2ff','#ff7043'];
  let ci = 0;

  let x = 100, y = 80, vx = 4.2, vy = 3.1;
  let w = 0, h = 0, W = 0, H = 0;

  // Charge le logo officiel ; s'il arrive => on l'affiche (recolorable),
  // sinon on garde le texte de secours.
  const probe = new Image();
  probe.onload = function () {
    const targetW = Math.min(480, window.innerWidth * 0.42);
    const ratio = probe.naturalHeight / probe.naturalWidth || 0.3;
    mask.style.width  = targetW + 'px';
    mask.style.height = (targetW * ratio) + 'px';
    logo.style.setProperty('--logo-src', 'url("' + LOGO_URL + '")');
    logo.classList.add('use-image');
    measure();
  };
  probe.src = LOGO_URL;

  function measure() {
    W = window.innerWidth; H = window.innerHeight;
    w = logo.offsetWidth; h = logo.offsetHeight;
    if (x + w > W) x = W - w;
    if (y + h > H) y = H - h;
  }

  function nextColor() {
    ci = (ci + 1) % colors.length;
    logo.style.color = colors[ci];
  }

  function tick() {
    x += vx; y += vy;
    let b = false;
    if (x <= 0)     { x = 0;     vx = Math.abs(vx);  b = true; }
    if (x + w >= W) { x = W - w; vx = -Math.abs(vx); b = true; }
    if (y <= 0)     { y = 0;     vy = Math.abs(vy);  b = true; }
    if (y + h >= H) { y = H - h; vy = -Math.abs(vy); b = true; }
    if (b) nextColor();
    logo.style.transform = 'translate(' + x + 'px,' + y + 'px)';
    requestAnimationFrame(tick);
  }

  function goFullscreen() {
    const el = document.documentElement;
    const req = el.requestFullscreen || el.webkitRequestFullscreen;
    if (req) { try { req.call(el); } catch (e) {} }
  }
  function dismissHint() { hint.style.opacity = '0'; goFullscreen(); }

  window.addEventListener('resize', measure);
  document.addEventListener('click', dismissHint);
  document.addEventListener('touchstart', dismissHint, { passive: true });

  // Empêche la mise en veille si possible
  if ('wakeLock' in navigator) {
    const lock = () => { try { navigator.wakeLock.request('screen'); } catch (e) {} };
    lock();
    document.addEventListener('visibilitychange', function () {
      if (document.visibilityState === 'visible') lock();
    });
  }

  logo.style.color = colors[0];
  measure();
  requestAnimationFrame(tick);
})();
</script>
</body>
</html>
